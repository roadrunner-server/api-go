version: v2
plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: .
    opt: paths=source_relative
  - remote: buf.build/grpc/go:v1.6.1
    out: .
    opt:
      - paths=source_relative
  - remote: buf.build/connectrpc/go:v1.19.1
    opt:
      - paths=source_relative
    out: .
    exclude_types:
      - centrifugal.centrifugo.api
      - centrifugal.centrifugo.proxy
    types:
      - lock.v1
      - kv.v2
      - http.v2
      - jobs.v2
